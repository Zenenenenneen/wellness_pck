<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Harmonious Wellness Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow hero-brand">The Harmonious</p>
      </div>
    </section>

    <section class="courses" aria-labelledby="courses-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">What we offer</p>
        </div>
      </div>

      <div class="course-grid">
        <article class="course-card">
          <img src="S__1753105.jpg" alt="Wellness Garden Yoga class poster" />
          <div class="course-meta">
            <h3>Wellness Garden Yoga</h3>
          </div>
        </article>

        <article class="course-card">
          <img src="S__1753106.jpg" alt="Daily Yoga Classes promotional poster" />
          <div class="course-meta">
            <h3>Daily Yoga Classes</h3>
          </div>
        </article>

        <article class="course-card">
          <img src="S__1753107.jpg" alt="Yoga hosted by Kru Nancy promotional poster" />
          <div class="course-meta">
            <h3>Hosted Yoga Sessions</h3>
        </article>

        <article class="course-card">
          <img src="S__1753108.jpg" alt="Private Garden Yoga promotional poster" />
          <div class="course-meta">
            <h3>Private Garden Yoga</h3>
          </div>
        </article>
        
        <article class="course-card">
          <img src="kidsyoga.png" alt="Yoga for Kids promotional poster" />
          <div class="course-meta">
            <h3>Yoga for Kids</h3>
          </div>
      </div>
    </section>

  </main>
</body>
</html>
